<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c1222;--surface:#151d30;--card:#1a2540;--card-hover:#1f2d4a;
  --border:#243049;--text:#e8ecf4;--text2:#8899b4;--text3:#5a6a86;
  --green:#22c55e;--green-dim:#166534/* reserved */;--green-bg:rgba(34,197,94,0.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);
  --blue:#3b82f6/* reserved */;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
input{font-family:'DM Mono',monospace;font-size:18px;background:var(--surface);border:2px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--radius-sm);width:100%;outline:none;transition:border-color 0.2s}
input:focus{border-color:var(--green)}
input::placeholder{color:var(--text3)}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none;transition:all 0.15s}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;width:100%;position:relative}
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Instrument Serif',serif;font-size:28px;letter-spacing:-0.5px}
.stats-badge{display:flex;gap:12px;font-size:13px;color:var(--text2);font-weight:500}
.stats-badge span{display:flex;align-items:center;gap:4px}
.score-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:6px 20px;flex-shrink:0;font-size:13px;font-weight:600}
.score-bar .streak{color:var(--amber)}
.score-bar .correct{color:var(--green)}
.score-bar .pct{color:var(--text2)}
.sync-bar{display:flex;align-items:center;justify-content:space-between;margin:0 16px 10px;padding:10px 14px;background:var(--surface);border-radius:var(--radius-sm);font-size:12px;color:var(--text2);flex-shrink:0}
.sync-bar .sync-info{display:flex;align-items:center;gap:6px}
.sync-btn{background:var(--green);color:#000;font-weight:700;font-size:12px;padding:6px 14px;border-radius:6px;display:flex;align-items:center;gap:5px}
.sync-btn:hover{background:#16a34a}
.sync-btn:disabled{opacity:0.5}
.sync-btn .dot{width:6px;height:6px;background:#000;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.mode-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:0 16px 10px;flex-shrink:0}
.mode-btn{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--text2);transition:all 0.15s;line-height:1.3}
.mode-btn:hover{background:var(--card-hover);color:var(--text)}
.mode-btn.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.drill-area{flex:1;overflow-y:auto;padding:0 16px 24px;display:flex;flex-direction:column;gap:16px}
.drill-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.drill-card .tense{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:12px}
.drill-card .word{font-family:'Instrument Serif',serif;font-size:36px;line-height:1.1;margin-bottom:4px}
.drill-card .hint{font-size:14px;color:var(--text2);margin-bottom:20px}
.drill-card .hint em{color:var(--green);font-style:normal;font-weight:600}
.input-row{display:flex;gap:8px}
.go-btn{background:var(--green);color:#000;font-weight:700;font-size:16px;padding:12px 20px;border-radius:var(--radius-sm)}
.go-btn:hover{background:#16a34a}
.feedback{padding:14px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;margin-top:8px;animation:fadeIn 0.2s}
.feedback.correct{background:var(--green-bg);color:var(--green)}
.feedback.wrong{background:var(--red-bg);color:var(--red)}
.feedback.close{background:var(--amber-bg);color:var(--amber)}
.next-btn{background:var(--surface);color:var(--text);font-weight:600;font-size:14px;padding:10px 20px;border-radius:var(--radius-sm);margin-top:8px;width:100%}
.next-btn:hover{background:var(--card-hover)}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.opt-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-weight:600;font-size:15px;padding:14px;border-radius:var(--radius-sm);transition:all 0.15s}
.opt-btn:hover{border-color:var(--text3)}
.opt-btn.selected-correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.opt-btn.selected-wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.opt-btn.show-correct{border-color:var(--green);color:var(--green)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.filter-pill{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;transition:all 0.15s}
.filter-pill:hover{color:var(--text)}
.filter-pill.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:12px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:8px}
.word-chip{background:var(--card);border:1px solid var(--border);color:var(--text);font-weight:500;font-size:15px;padding:8px 14px;border-radius:6px;cursor:pointer;transition:all 0.1s;user-select:none}
.word-chip:hover{border-color:var(--text3)}
.word-chip.placed{opacity:0.3;pointer-events:none}
.sentence-build{display:flex;flex-wrap:wrap;gap:8px;min-height:48px;padding:12px;background:var(--bg);border:2px dashed var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.sentence-build .word-chip{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.footer{padding:8px 16px 16px;text-align:center;font-size:11px;color:var(--text3);flex-shrink:0}
.footer a{color:var(--text3)}
.settings-icon{background:none;color:var(--text3);font-size:18px;padding:4px}
.settings-icon:hover{color:var(--text)}
.settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px}
.settings-panel label{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text2);padding:8px 0;border-bottom:1px solid var(--border)}
.settings-panel label:last-child{border-bottom:none}
select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif}
@media(min-width:768px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
.daily-card{background:linear-gradient(135deg,#1a2540 0%,#1e3a5f 100%);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin:0 16px 10px;cursor:pointer;position:relative;overflow:hidden;flex-shrink:0}
.daily-card .daily-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--amber);margin-bottom:8px}
.daily-card .daily-pt{font-family:'Instrument Serif',serif;font-size:22px;line-height:1.3;margin-bottom:4px}
.daily-card .daily-en{font-size:14px;color:var(--text2);opacity:0;transition:opacity 0.3s}
.daily-card .daily-en.show{opacity:1}
.daily-card .daily-tap{font-size:11px;color:var(--text3);position:absolute;bottom:8px;right:16px}
.listen-btn{background:var(--surface);border:2px solid var(--border);color:var(--green);width:64px;height:64px;border-radius:50%;font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;transition:all 0.2s}
.listen-btn:hover{border-color:var(--green);background:var(--green-bg)}
.listen-btn.playing{border-color:var(--amber);color:var(--amber);animation:pulse 1s infinite}
.reading-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;animation:fadeIn 0.2s ease}
.reading-card .grammar-note{font-size:12px;color:var(--amber);background:var(--amber-bg);padding:8px 12px;border-radius:6px;margin-top:8px}
.diff-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px;display:inline-block;margin-bottom:8px}
.diff-badge.easy{background:var(--green-bg);color:var(--green)}
.diff-badge.medium{background:var(--amber-bg);color:var(--amber)}
.diff-badge.hard{background:var(--red-bg);color:var(--red)}
.stats-toggle{background:none;color:var(--text3);font-size:13px;padding:4px 8px;text-decoration:underline}
.stats-toggle:hover{color:var(--text2)}
.stats-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 10px;animation:fadeIn 0.2s}
.stats-panel h3{font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:600}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.stat-row .stat-label{width:70px;color:var(--text2);font-weight:500;flex-shrink:0}
.stat-row .stat-bar{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.stat-row .stat-fill{height:100%;border-radius:4px;transition:width 0.3s}
.stat-row .stat-pct{width:36px;text-align:right;color:var(--text3);font-weight:600}
.weak-list{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.weak-item{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--text2)}
.weak-item .weak-word{color:var(--text);font-weight:500}
.weak-item .weak-rate{color:var(--red)}
.level-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;color:var(--amber)}
.self-rate{display:flex;gap:8px;margin-top:16px}
.self-rate button{flex:1;padding:10px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;border:1.5px solid var(--border);color:var(--text2);background:var(--surface)}
.self-rate button:hover{border-color:var(--text3);color:var(--text)}
.self-rate button.rate-easy{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.self-rate button.rate-ok{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}
.self-rate button.rate-hard{border-color:var(--red);color:var(--red);background:var(--red-bg)}
</style>
</head>

const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const pick = arr => arr[Math.floor(Math.random() * arr.length)];

function weightedPick(arr, keyFn, weakWords) {
  if (!arr.length) return null;
  if (!weakWords || !Object.keys(weakWords).length) return pick(arr);
  const now = Date.now();
  const weights = arr.map(item => {
    const key = keyFn(item);
    const w = weakWords[key];
    if (!w || (w.right + w.wrong) === 0) return 1;
    const errorRate = w.wrong / (w.right + w.wrong);
    const hoursSince = (now - (w.lastSeen || now)) / 3600000;
    const recency = Math.min(hoursSince / 24, 3);
    return 1 + errorRate * 4 + recency;
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < arr.length; i++) {
    r -= weights[i];
    if (r <= 0) return arr[i];
  }
  return arr[arr.length - 1];
}

const exactMatch = (a, b) => a?.toLowerCase().trim() === b?.toLowerCase().trim();
const closeMatch = (a, b) => normalize(a) === normalize(b);

function mergeData(base, synced, keyFn) {
  if (!synced?.length) return base;
  const seen = new Set(base.map(keyFn));
  const newItems = synced.filter(i => !seen.has(keyFn(i)));
  return [...base, ...newItems];
}

function useTrainerData() {
  const syncedData = LS.get("synced", null);

  const verbs = useMemo(() => mergeData(VERBS, syncedData?.verbs, v=>v.infinitive), [syncedData]);
  const vocabulary = useMemo(() => mergeData(VOCABULARY, syncedData?.vocabulary, v=>v.portuguese), [syncedData]);
  const rigVocab = useMemo(() => mergeData(RIG_VOCAB, syncedData?.rig_vocab, v=>v.portuguese), [syncedData]);
  const serEstar = useMemo(() => mergeData(SER_ESTAR, syncedData?.ser_estar, v=>v.phrase), [syncedData]);
  const prepositions = useMemo(() => mergeData(PREPOSITIONS, syncedData?.prepositions, v=>v.phrase), [syncedData]);
  const phrases = useMemo(() => mergeData(PHRASES, syncedData?.phrases, v=>v.phrase), [syncedData]);
  const sentences = useMemo(() => mergeData(SENTENCES, syncedData?.sentences, v=>v.english), [syncedData]);
  const rigScenarios = useMemo(() => mergeData(RIG_SCENARIOS, syncedData?.rig_scenarios, v=>v.situation), [syncedData]);
  const reading = useMemo(() => syncedData?.reading || [], [syncedData]);
  const allVocab = useMemo(() => [...vocabulary, ...rigVocab], [vocabulary, rigVocab]);
  const genderWords = useMemo(() => allVocab.filter(v => v.gender), [allVocab]);

  return { verbs, vocabulary, rigVocab, serEstar, prepositions, phrases, sentences, rigScenarios, allVocab, genderWords, reading };
}

function Conjugar({ verbs, onRecord }) {
  const [tense, setTense] = useState("presente");
  const [vFilter, setVFilter] = useState("all");
  const [q, setQ] = useState(null);
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null);
  const inputRef = useRef(null);

  const tenses = useMemo(() => {
    const t = new Set();
    verbs.forEach(v => Object.keys(v.conjugations).forEach(k => t.add(k)));
    return [...t];
  }, [verbs]);

  const filtered = useMemo(() => {
    let f = verbs.filter(v => v.conjugations[tense]);
    if (vFilter !== "all") f = f.filter(v => v.type === vFilter);
    return f;
  }, [verbs, tense, vFilter]);

  const next = useCallback(() => {
    const verb = pick(filtered);
    if (!verb) return;
    const pronouns = Object.keys(verb.conjugations[tense]);
    const pronoun = pick(pronouns);
    setQ({ verb, pronoun, answer: verb.conjugations[tense][pronoun] });
    setInput(""); setResult(null);
    setTimeout(() => inputRef.current?.focus(), 50);
  }, [filtered, tense]);

  useEffect(() => { if (filtered.length) next(); }, [tense, vFilter, filtered.length]);

  const check = () => {
    if (!q || !input.trim()) return;
    if (exactMatch(input, q.answer)) {
      setResult({ status: 'correct', answer: q.answer });
      onRecord(true, q.verb.infinitive);
    } else if (closeMatch(input, q.answer)) {
      setResult({ status: 'close', answer: q.answer });
    } else {
      setResult({ status: 'wrong', answer: q.answer });
      onRecord(false, q.verb.infinitive);
    }
  };

  if (!q) return <div className="drill-card"><p style={{color:'var(--text2)'}}>No verbs for this filter</p></div>;

  return <>
    <div className="filter-row">
      {tenses.map(t => <button key={t} className={`filter-pill ${tense===t?'active':''}`} onClick={()=>setTense(t)}>{t}</button>)}
    </div>
    <div className="filter-row">
      {[["all","All"],["irregular","Irreg"],["regular_ar","-AR"],["regular_er","-ER"],["regular_ir","-IR"]].map(([k,l])=>
        <button key={k} className={`filter-pill ${vFilter===k?'active':''}`} onClick={()=>setVFilter(k)}>{l}</button>
      )}
    </div>
    <div className="drill-card">
      <div className="tense">{tense}</div>
      <div className="word">{q.verb.infinitive}</div>
      <div className="hint">{q.verb.english} — <em>{q.pronoun}</em></div>
      <div className="input-row">
        <input ref={inputRef} value={input} onChange={e=>{setInput(e.target.value);if(result?.status==='close')setResult(null);}} onKeyDown={e=>{ if(e.key==='Enter'){ if(result&&result.status!=='close') next(); else check(); }}} placeholder="Type conjugation..." autoComplete="off" autoCapitalize="off" />
        <button className="go-btn" onClick={()=>{ if(result&&result.status!=='close') next(); else check(); }}>{result&&result.status!=='close'?'→':'Go'}</button>
      </div>
      {result && <div className={`feedback ${result.status==='correct'?'correct':result.status==='close'?'close':'wrong'}`}>
        {result.status==='correct' ? '✓ Correct!' : result.status==='close' ? `⚠ Close! Check accents → ${q.answer}` : `✗ ${q.answer}`}
      </div>}
    </div>
  </>;
}

function VocabQuiz({ vocab, onRecord }) {
  const [dir, setDir] = useState("pt-en");
  const [q, setQ] = useState(null);
  const [selected, setSelected] = useState(null);

  const next = useCallback(() => {
    const word = pick(vocab);
    const others = shuffle(vocab.filter(w => w.portuguese !== word.portuguese)).slice(0,3);
    const opts = shuffle([word, ...others]);
    setQ({ word, opts });
    setSelected(null);
  }, [vocab]);

  useEffect(() => { if(vocab.length) next(); }, [dir, vocab.length]);

  if (!q) return null;
  const prompt = dir === "pt-en" ? q.word.portuguese : q.word.english;
  const getLabel = w => dir === "pt-en" ? w.english : w.portuguese;
  const correct = w => w.portuguese === q.word.portuguese;

  return <>
    <div className="filter-row">
      <button className={`filter-pill ${dir==='pt-en'?'active':''}`} onClick={()=>setDir('pt-en')}>PT → EN</button>
      <button className={`filter-pill ${dir==='en-pt'?'active':''}`} onClick={()=>setDir('en-pt')}>EN → PT</button>
    </div>
    <div className="drill-card">
      <div className="word">{prompt}</div>
      {q.word.category && <div className="hint">{q.word.category}</div>}
      <div className="options-grid">
        {q.opts.map((w,i) => {
          let cls = "opt-btn";
          if (selected !== null) {
            if (correct(w)) cls += " selected-correct";
            else if (selected === i && !correct(w)) cls += " selected-wrong";
          }
          return <button key={i} className={cls} disabled={selected!==null} onClick={()=>{ setSelected(i); onRecord(correct(w), q.word.portuguese); }}>{getLabel(w)}</button>;
        })}
      </div>
      {selected !== null && <button className="next-btn" onClick={next}>Next →</button>}
    </div>
  </>;
}

function SentenceBuilder({ data, onRecord }) {
  const [q, setQ] = useState(null);
  const [placed, setPlaced] = useState([]);
  const [bank, setBank] = useState([]);
  const [result, setResult] = useState(null);

  const next = useCallback(() => {
    const s = pick(data);
    setQ(s);
    setPlaced([]);
    setBank(shuffle(s.words.map((w,i)=>({w,id:i}))));
    setResult(null);
  }, [data]);

  useEffect(() => { if(data.length) next(); }, [data.length]);

  const addWord = (item) => { setPlaced(p=>[...p,item]); };
  const removeWord = (item) => { setPlaced(p=>p.filter(x=>x.id!==item.id)); };

  const check = () => {
    if (placed.length !== q.words.length) return;
    const built = placed.map(p=>p.w).join(" ");
    const expected = q.words.join(" ");
    const correct = normalize(built) === normalize(expected);
    setResult({ correct, expected });
    onRecord(correct, q.english);
  };

  if (!q) return null;

  const placedIds = new Set(placed.map(p=>p.id));

  return <div className="drill-card">
    <div className="tense">BUILD THE SENTENCE</div>
    <div className="hint" style={{fontSize:'16px',marginBottom:'16px'}}>{q.english}</div>
    <div className="sentence-build">
      {placed.length === 0 && <span style={{color:'var(--text3)',fontSize:'14px'}}>Tap words below...</span>}
      {placed.map((p,i)=><span key={i} className="word-chip" onClick={()=>removeWord(p)}>{p.w}</span>)}
    </div>
    <div className="word-bank">
      {bank.map((item,i) => <button key={i} className={`word-chip ${placedIds.has(item.id)?'placed':''}`} onClick={()=>addWord(item)}>{item.w}</button>)}
    </div>
    {placed.length === q?.words.length && !result && <button className="go-btn" style={{width:'100%'}} onClick={check}>Check</button>}
    {result && <div className={`feedback ${result.correct?'correct':'wrong'}`}>
      {result.correct ? '✓ Correct!' : `✗ ${result.expected}`}
    </div>}
    {result && <button className="next-btn" onClick={next}>Next →</button>}
  </div>;
}

function DailySentence({ sentences, reading }) {
  const [revealed, setRevealed] = useState(false);
  const allSentences = useMemo(() => {
    const r = (reading || []).filter(s => s.portuguese && s.english);
    return r.length ? r : sentences;
  }, [reading, sentences]);
  const todaySentence = useMemo(() => {
    if (!allSentences.length) return null;
    const d = new Date();
    const hash = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
    return allSentences[hash % allSentences.length];
  }, [allSentences]);

  if (!todaySentence) return null;
  const pt = todaySentence.portuguese || todaySentence.words?.join(" ") || "";
  const en = todaySentence.english;

  return <div className="daily-card" onClick={() => setRevealed(!revealed)}>
    <div className="daily-label">Frase do Dia</div>
    <div className="daily-pt">{pt}</div>
    <div className={`daily-en ${revealed ? 'show' : ''}`}>{en}</div>
    {!revealed && <div className="daily-tap">tap to reveal</div>}
  </div>;
}

function ListeningDrill({ vocab, sentences, onRecord }) {
  const [drillType, setDrillType] = useState("words");
  const [q, setQ] = useState(null);
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null);
  const [playing, setPlaying] = useState(false);
  const inputRef = useRef(null);

  const items = useMemo(() => {
    if (drillType === "words") return vocab.map(v => ({ text: v.portuguese, hint: v.english, key: v.portuguese }));
    return sentences.map(s => ({ text: s.words ? s.words.join(" ") : s.portuguese, hint: s.english, key: s.english || s.portuguese }));
  }, [drillType, vocab, sentences]);

  const speak = useCallback((text) => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "pt-BR";
    u.rate = 0.85;
    const voices = window.speechSynthesis.getVoices();
    const ptVoice = voices.find(v => v.lang.startsWith("pt"));
    if (ptVoice) u.voice = ptVoice;
    u.onstart = () => setPlaying(true);
    u.onend = () => setPlaying(false);
    window.speechSynthesis.speak(u);
  }, []);

  const next = useCallback(() => {
    const item = pick(items);
    if (!item) return;
    setQ(item);
    setInput("");
    setResult(null);
    setTimeout(() => { speak(item.text); inputRef.current?.focus(); }, 200);
  }, [items, speak]);

  useEffect(() => { if (items.length) next(); }, [drillType, items.length]);
  useEffect(() => { window.speechSynthesis?.getVoices(); }, []);

  const check = () => {
    if (!q || !input.trim()) return;
    if (exactMatch(input, q.text)) {
      setResult({ status: 'correct' }); onRecord(true, q.key);
    } else if (closeMatch(input, q.text)) {
      setResult({ status: 'close' });
    } else {
      setResult({ status: 'wrong' }); onRecord(false, q.key);
    }
  };

  if (!q) return <div className="drill-card"><p style={{color:'var(--text2)'}}>No audio items available</p></div>;

  return <>
    <div className="filter-row">
      <button className={`filter-pill ${drillType==='words'?'active':''}`} onClick={() => setDrillType('words')}>Words</button>
      <button className={`filter-pill ${drillType==='sentences'?'active':''}`} onClick={() => setDrillType('sentences')}>Sentences</button>
    </div>
    <div className="drill-card">
      <div className="tense">OUVIR</div>
      <button className={`listen-btn ${playing ? 'playing' : ''}`} onClick={() => speak(q.text)}>
        {playing ? '...' : '\u25B6'}
      </button>
      <div className="hint" style={{textAlign:'center',marginBottom:'12px'}}>{q.hint}</div>
      <div className="input-row">
        <input ref={inputRef} value={input} onChange={e => { setInput(e.target.value); if (result?.status === 'close') setResult(null); }}
          onKeyDown={e => { if (e.key === 'Enter') { if (result && result.status !== 'close') next(); else check(); } }}
          placeholder="Type what you hear..." autoComplete="off" autoCapitalize="off" />
        <button className="go-btn" onClick={() => { if (result && result.status !== 'close') next(); else check(); }}>
          {result && result.status !== 'close' ? '\u2192' : 'Go'}
        </button>
      </div>
      {result && <div className={`feedback ${result.status === 'correct' ? 'correct' : result.status === 'close' ? 'close' : 'wrong'}`}>
        {result.status === 'correct' ? '\u2713 Correct!' : result.status === 'close' ? `\u26A0 Close! Check accents \u2192 ${q.text}` : `\u2717 ${q.text}`}
      </div>}
    </div>
  </>;
}

    {id:'build', label:'Sentence'}, {id:'rig', label:'Rig'}, {id:'leitura', label:'Leitura'}, {id:'ouvir', label:'Ouvir'},
  ];

  const weakList = useMemo(() => {
    if (!weakWords) return [];
    return Object.entries(weakWords)
      .filter(([, w]) => (w.right + w.wrong) >= 3)
      .map(([word, w]) => ({ word, rate: Math.round(w.wrong / (w.right + w.wrong) * 100), total: w.right + w.wrong }))
      .sort((a, b) => b.rate - a.rate)
      .slice(0, 10);
  }, [weakWords]);

  return <div className="stats-panel">
    {level?.cefr && <div style={{marginBottom:'12px'}}><span className="level-badge">{level.cefr}</span></div>}
    <h3>Mode Accuracy</h3>
    {modeList.map(m => {
      const ms = modeStats[m.id] || { correct: 0, total: 0 };
      const pct = ms.total > 0 ? Math.round(ms.correct / ms.total * 100) : 0;
      const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : pct > 0 ? 'var(--red)' : 'var(--text3)';
      return <div key={m.id} className="stat-row">
        <span className="stat-label">{m.label}</span>
        <div className="stat-bar"><div className="stat-fill" style={{width: pct+'%', background: color}}></div></div>
        <span className="stat-pct" style={{color}}>{ms.total > 0 ? pct+'%' : '-'}</span>
      </div>;
    })}
    {weakList.length > 0 && <div className="weak-list">
      <h3>Weak Words</h3>
      {weakList.map(w => <div key={w.word} className="weak-item">
        <span className="weak-word">{w.word}</span>
        <span className="weak-rate">{w.rate}% wrong ({w.total})</span>
      </div>)}
    </div>}
  </div>;
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const data = useTrainerData();
  const [mode, setMode] = useState("conjugar");
  const [showStats, setShowStats] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState(LS.get("syncMsg",""));
  const [lastSync, setLastSync] = useState(LS.get("lastSync",""));
  const [cloudLoaded, setCloudLoaded] = useState(false);
  const [level, setLevel] = useState(LS.get("level", null));

  // Initialize stats with per-mode tracking
  const defaultStats = {correct:0,total:0,streak:0,best:0,modes:{}};
  const [stats, setStats] = useState(() => {
    const saved = LS.get("stats", defaultStats);
    if (!saved.modes) saved.modes = {};
    return saved;
  });

  // Weak word tracking
  const [weakWords, setWeakWords] = useState(() => LS.get("weakWords", {}));

  // Load from server on mount
  useEffect(() => {
    fetch("/api/data")
      .then(r => r.json())
      .then(cloud => {
        if (cloud && Object.keys(cloud).length > 0) {
          if (cloud.synced) LS.set("synced", cloud.synced);
          if (cloud.stats) {
            const s = cloud.stats;
            if (!s.modes) s.modes = {};
            LS.set("stats", s);
            setStats(s);
          }
          if (cloud.lastSync) { LS.set("lastSync", cloud.lastSync); setLastSync(cloud.lastSync); }
          if (cloud.syncMsg) { LS.set("syncMsg", cloud.syncMsg); setSyncMsg(cloud.syncMsg); }
          if (cloud.level) { LS.set("level", cloud.level); setLevel(cloud.level); }
        }
        setCloudLoaded(true);
      })
      .catch(() => setCloudLoaded(true));
  }, []);

  // Save stats to localStorage + debounced cloud save
  const statsTimer = useRef(null);
  useEffect(() => {
    LS.set("stats", stats);
    LS.set("weakWords", weakWords);
    if (!cloudLoaded) return;
    clearTimeout(statsTimer.current);
    statsTimer.current = setTimeout(() => {
      fetch("/api/data", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ action: "save-stats", stats })
      }).catch(() => {});
    }, 3000);
  }, [stats, weakWords, cloudLoaded]);

  const record = useCallback((correct, itemKey) => {
    setStats(s => {
      const streak = correct ? s.streak + 1 : 0;
      const modes = { ...s.modes };
      const ms = modes[mode] || { correct: 0, total: 0 };
      modes[mode] = { correct: ms.correct + (correct ? 1 : 0), total: ms.total + 1 };
      return {
        correct: s.correct + (correct ? 1 : 0),
        total: s.total + 1,
        streak,
        best: Math.max(s.best, streak),
        modes,
      };
    });
    if (itemKey) {
      setWeakWords(ww => {
        const entry = ww[itemKey] || { right: 0, wrong: 0, lastSeen: 0 };
        return {
          ...ww,
          [itemKey]: {
            right: entry.right + (correct ? 1 : 0),
            wrong: entry.wrong + (correct ? 0 : 1),
            lastSeen: Date.now(),
          },
        };
      });
    }
  }, [mode]);

  const doSync = async () => {
    setSyncing(true); setSyncMsg("Syncing...");
    try {
      const res = await fetch("/api/sync", { method: "POST" });
      if (!res.ok) throw new Error("Sync failed: " + res.status);
      const cloud = await res.json();

      const prevSynced = LS.get("synced", {});
      const prevTotalVerbs = mergeData(VERBS, prevSynced?.verbs, v=>v.infinitive).length;
      const prevTotalVocab = mergeData(VOCABULARY, prevSynced?.vocabulary, v=>v.portuguese).length;

      if (cloud.synced) LS.set("synced", cloud.synced);
      if (cloud.lastSync) { LS.set("lastSync", cloud.lastSync); setLastSync(cloud.lastSync); }
      if (cloud.level) { LS.set("level", cloud.level); setLevel(cloud.level); }

      const syncData = cloud.synced || {};
      const newTotalVerbs = mergeData(VERBS, syncData.verbs, v=>v.infinitive).length;
      const newTotalVocab = mergeData(VOCABULARY, syncData.vocabulary, v=>v.portuguese).length;
      const addedVerbs = newTotalVerbs - prevTotalVerbs;
      const addedVocab = newTotalVocab - prevTotalVocab;

      const msg = addedVerbs === 0 && addedVocab === 0
        ? `\u2713 Up to date (${newTotalVerbs} verbs, ${newTotalVocab} words)`
        : `\u2713 +${addedVerbs} verbs, +${addedVocab} words (${newTotalVerbs} total)`;
      setSyncMsg(msg);
      LS.set("syncMsg", msg);
    } catch (err) {
      setSyncMsg("\u2717 " + err.message);
    } finally {
      setSyncing(false);
    }
  };

  const totalVerbs = data.verbs.length;
  const totalWords = data.vocabulary.length + data.rigVocab.length;

  const modes = [
    {id:"conjugar",label:"Conjugar"},
    {id:"vocab",label:"Vocab"},
    {id:"gender",label:"O vs A"},
    {id:"serest",label:"Ser / Estar"},
    {id:"prep",label:"Prep"},
    {id:"preencha",label:"Preencha"},
    {id:"build",label:"Sentence"},
    {id:"rig",label:"Rig"},
    {id:"leitura",label:"Leitura"},
    {id:"ouvir",label:"Ouvir"},
  ];

  const pct = stats.total > 0 ? Math.round(stats.correct/stats.total*100) : 0;

  return <div className="app">
    <div className="header">
      <div className="logo">Portugu\u00EAs.</div>
      <div className="stats-badge">
        <span>{totalVerbs} verbs</span>
        <span>\u00B7</span>
        <span>{totalWords} words</span>
        {level?.cefr && <><span>\u00B7</span><span className="level-badge">{level.cefr}</span></>}
      </div>
    </div>

    <div className="score-bar">
      <span className="streak">\uD83D\uDD25 {stats.streak}</span>
      <span className="correct">\u2713 {stats.correct}/{stats.total}</span>
      <span className="pct">{pct}%</span>
      <button className="stats-toggle" onClick={() => setShowStats(!showStats)}>{showStats ? 'Hide Stats' : 'Stats'}</button>
    </div>

    {showStats && <StatsPanel stats={stats} weakWords={weakWords} level={level} />}

    <DailySentence sentences={data.sentences} reading={data.reading} />

    <div className="sync-bar">
      <div className="sync-info">
        {syncing ? <><span className="dot" style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'var(--green)',animation:'pulse 1s infinite'}}></span> {syncMsg}</> :
         syncMsg ? syncMsg :
         lastSync ? `Synced: ${lastSync}` : "Not synced yet"}
      </div>
      <button className="sync-btn" onClick={doSync} disabled={syncing}>
        {syncing ? "..." : "Sync"}
      </button>
    </div>

    <div className="mode-grid">
      {modes.map(m => <button key={m.id} className={`mode-btn ${mode===m.id?'active':''}`} onClick={()=>setMode(m.id)}>{m.label}</button>)}
    </div>

    <div className="drill-area">
      {mode==="conjugar" && <Conjugar verbs={data.verbs} onRecord={record} />}
      {mode==="vocab" && <VocabQuiz vocab={data.allVocab} onRecord={record} />}
      {mode==="gender" && <GenderDrill words={data.genderWords} onRecord={record} />}
      {mode==="serest" && <SerEstarDrill data={data.serEstar} onRecord={record} />}
      {mode==="prep" && <PrepDrill data={data.prepositions} onRecord={record} />}
      {mode==="preencha" && <FillGap data={data.phrases} onRecord={record} />}
      {mode==="build" && <SentenceBuilder data={data.sentences} onRecord={record} />}
      {mode==="rig" && <RigScenario data={data.rigScenarios} onRecord={record} />}
      {mode==="leitura" && <SentenceReview data={data.reading.length ? data.reading : data.sentences.map(s => ({portuguese: s.words.join(" "), english: s.english, grammar_note: "", difficulty: "medium", category: s.category}))} onRecord={record} />}
      {mode==="ouvir" && <ListeningDrill vocab={data.allVocab} sentences={data.sentences} onRecord={record} />}
    </div>

    <div className="footer">Built from Sophia's lessons \u00B7 Seadrill edition</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
